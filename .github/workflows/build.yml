name: Build HorizonOverlay

on:
  push:
  pull_request:
  workflow_dispatch:

env:
  STELLARIUM_TAG: v25.1
  QT_VERSION: 6.8.1

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS
            os: macos-13
            artifact: HorizonOverlay-macos
            qt_arch: clang_64
            cmake_osx_arch: x86_64
          - name: Linux
            os: ubuntu-24.04
            artifact: HorizonOverlay-linux
          - name: Windows
            os: windows-2022
            artifact: HorizonOverlay-windows
            qt_arch: win64_msvc2022_64

    steps:
      - name: Checkout HorizonOverlay
        uses: actions/checkout@v4
        with:
          path: horizon-overlay

      - name: Checkout Stellarium
        uses: actions/checkout@v4
        with:
          repository: Stellarium/stellarium
          ref: ${{ env.STELLARIUM_TAG }}
          path: stellarium

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            gettext \
            libgl1-mesa-dev \
            libglu1-mesa-dev \
            libmd4c-dev \
            libxkbcommon-x11-0 \
            mesa-common-dev \
            ninja-build \
            zlib1g-dev

      - name: Install macOS system dependencies
        if: runner.os == 'macOS'
        run: |
          brew update
          brew install gettext md4c ninja pkg-config

      - name: Set up MSVC
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install Qt
        if: matrix.qt_arch != ''
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT_VERSION }}
          arch: ${{ matrix.qt_arch }}
          modules: qtcharts qtmultimedia qtpositioning qtserialport
          cache: true

      - name: Install Qt
        if: matrix.qt_arch == ''
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT_VERSION }}
          modules: qtcharts qtmultimedia qtpositioning qtserialport
          cache: true

      - name: Add HorizonOverlay to Stellarium source tree
        shell: bash
        run: |
          cmake -E copy_directory horizon-overlay/plugin/HorizonOverlay stellarium/plugins/HorizonOverlay
          perl -0pi -e 's/(ADD_PLUGIN\(SimpleDrawLine 0\)\R)/$1ADD_PLUGIN(HorizonOverlay 1)\n/' stellarium/CMakeLists.txt

      - name: Configure
        shell: bash
        run: |
          cmake_extra=()
          if [[ "$RUNNER_OS" == "macOS" ]]; then
            cmake_extra+=("-DCMAKE_OSX_ARCHITECTURES=${{ matrix.cmake_osx_arch }}")
            cmake_extra+=("-DCMAKE_OSX_DEPLOYMENT_TARGET=12.0")
          fi
          cmake -S stellarium -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            "${cmake_extra[@]}" \
            -DUSE_PLUGIN_HORIZONOVERLAY=ON \
            -DUSE_PLUGIN_ANGLEMEASURE=OFF \
            -DUSE_PLUGIN_ARCHAEOLINES=OFF \
            -DUSE_PLUGIN_CALENDARS=OFF \
            -DUSE_PLUGIN_EQUATIONOFTIME=OFF \
            -DUSE_PLUGIN_EXOPLANETS=OFF \
            -DUSE_PLUGIN_HELLOSTELMODULE=OFF \
            -DUSE_PLUGIN_LENSDISTORTIONESTIMATOR=OFF \
            -DUSE_PLUGIN_METEORSHOWERS=OFF \
            -DUSE_PLUGIN_NAVSTARS=OFF \
            -DUSE_PLUGIN_NOVAE=OFF \
            -DUSE_PLUGIN_OBSERVABILITY=OFF \
            -DUSE_PLUGIN_OCULARS=OFF \
            -DUSE_PLUGIN_OCULUS=OFF \
            -DUSE_PLUGIN_ONLINEQUERIES=OFF \
            -DUSE_PLUGIN_POINTERCOORDINATES=OFF \
            -DUSE_PLUGIN_PULSARS=OFF \
            -DUSE_PLUGIN_QUASARS=OFF \
            -DUSE_PLUGIN_REMOTECONTROL=OFF \
            -DUSE_PLUGIN_REMOTESYNC=OFF \
            -DUSE_PLUGIN_SATELLITES=OFF \
            -DUSE_PLUGIN_SCENERY3D=OFF \
            -DUSE_PLUGIN_SIMPLEDRAWLINE=OFF \
            -DUSE_PLUGIN_SOLARSYSTEMEDITOR=OFF \
            -DUSE_PLUGIN_SUPERNOVAE=OFF \
            -DUSE_PLUGIN_TELESCOPECONTROL=OFF \
            -DUSE_PLUGIN_TEXTUSERINTERFACE=OFF \
            -DUSE_PLUGIN_VTS=OFF

      - name: Build plug-in
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -o pipefail
          cmake --build build --target HorizonOverlay --parallel 2 2>&1 | tee build/horizonoverlay-build.log

      - name: Build plug-in
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          cmake --build build --target HorizonOverlay --parallel 2 *> build/horizonoverlay-build.log
          Get-Content build/horizonoverlay-build.log
          if ($LASTEXITCODE -ne 0) {
            exit $LASTEXITCODE
          }

      - name: Upload failure logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: HorizonOverlay-${{ matrix.name }}-failure-logs
          path: |
            build/horizonoverlay-build.log
            build/CMakeFiles/CMakeConfigureLog.yaml
            build/CMakeFiles/CMakeOutput.log
            build/CMakeFiles/CMakeError.log
          if-no-files-found: ignore

      - name: Report failure log tail
        if: failure() && runner.os != 'Windows'
        shell: bash
        run: |
          log_file="build/horizonoverlay-build.log"
          if [[ ! -f "$log_file" && -f build/CMakeFiles/CMakeConfigureLog.yaml ]]; then
            log_file="build/CMakeFiles/CMakeConfigureLog.yaml"
          fi
          if [[ -f "$log_file" ]]; then
            {
              echo "### Failure log tail"
              echo '```text'
              tail -120 "$log_file"
              echo '```'
            } >> "$GITHUB_STEP_SUMMARY"
            message="$(tail -40 "$log_file" | tr '\n' ' ' | cut -c1-3500)"
            echo "::error title=Failure log tail::$message"
          fi

      - name: Report failure log tail
        if: failure() && runner.os == 'Windows'
        shell: pwsh
        run: |
          $logFile = "build/horizonoverlay-build.log"
          if (!(Test-Path $logFile) -and (Test-Path "build/CMakeFiles/CMakeConfigureLog.yaml")) {
            $logFile = "build/CMakeFiles/CMakeConfigureLog.yaml"
          }
          if (Test-Path $logFile) {
            "### Failure log tail" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append
            "``````text" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append
            Get-Content $logFile -Tail 120 | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append
            "``````" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append
            $message = (Get-Content $logFile -Tail 40) -join " "
            if ($message.Length -gt 3500) {
              $message = $message.Substring(0, 3500)
            }
            Write-Output "::error title=Failure log tail::$message"
          }

      - name: Package artifact
        shell: bash
        run: |
          mkdir -p "artifact/HorizonOverlay"
          plugin_lib="$(find build/plugins/HorizonOverlay/src -maxdepth 3 -type f \( -name 'libHorizonOverlay.*' -o -name 'HorizonOverlay.dll' \) | head -n 1)"
          if [[ -z "$plugin_lib" ]]; then
            echo "Could not find HorizonOverlay plug-in binary" >&2
            exit 1
          fi
          cp "$plugin_lib" "artifact/HorizonOverlay/"
          cp horizon-overlay/data/config.ini "artifact/HorizonOverlay/"
          cp horizon-overlay/data/obstructions.txt "artifact/HorizonOverlay/"
          cp horizon-overlay/README.md "artifact/"
          cp -R horizon-overlay/docs "artifact/docs"
          find artifact -maxdepth 3 -type f -print

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: artifact
